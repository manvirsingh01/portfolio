<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's Watching? | Manvir Singh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'netflix-red': '#E50914',
                        'netflix-red-hover': '#F40612',
                        'netflix-black': '#141414',
                        'netflix-dark': '#181818',
                        'netflix-gray': '#808080',
                        'netflix-light-gray': '#B3B3B3',
                    },
                    fontFamily: {
                        heading: ['Bebas Neue', 'Impact', 'sans-serif'],
                        body: ['DM Sans', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-red-hover: #F40612;
            --netflix-black: #141414;
            --netflix-dark: #181818;
            --netflix-gray: #808080;
            --netflix-light-gray: #B3B3B3;
            --netflix-white: #FFFFFF;
            --navbar-height: 68px;
            --card-width: 280px;
            --card-height: 157px;
            --card-scale: 1.3;
            --card-delay: 280ms;
            --z-cards: 10;
            --z-hovered: 50;
            --z-navbar: 1000;
            --z-modal: 2000;
            --z-toast: 5000;
            --z-loader: 9999;
        }

        body {
            font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
        }

        /* Loading spinner */
        #loader {
            position: fixed;
            inset: 0;
            background: #141414;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s;
        }
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader-ring {
            width: 56px;
            height: 56px;
            border: 3px solid #222;
            border-top-color: var(--netflix-red);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Profile card styles */
        .profile-card {
            transition: transform 0.2s ease;
        }
        .profile-card:hover {
            transform: scale(1.05);
        }

        /* Fade in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease forwards;
        }
    </style>
    <script src="js/app.js" defer></script>
</head>

<body class="bg-[#141414] min-h-screen flex flex-col justify-center items-center text-white antialiased">

    <!-- Loading Spinner -->
    <div id="loader">
        <div class="loader-ring"></div>
    </div>

    <!-- Profile Gate -->
    <div id="profile-gate" class="animate-fade-in flex flex-col items-center opacity-0">
        <h1 class="text-[clamp(2rem,3.5vw,3.5rem)] mb-10 font-light tracking-tight" style="font-family: 'DM Sans', sans-serif; font-weight: 300;">
            Who's watching?
        </h1>

        <div id="profile-list" class="flex flex-wrap gap-6 md:gap-10 justify-center">
            <!-- Profiles injected by JS -->
        </div>

        <a href="admin.html"
            class="mt-14 text-[#808080] border border-[#808080] px-6 py-2 hover:text-white hover:border-white transition-all duration-200 uppercase tracking-[0.15em] text-sm font-medium">
            Manage Profiles
        </a>
    </div>

</body>

</html>
