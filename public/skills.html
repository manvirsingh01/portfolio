<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills | Manvir Singh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'netflix-red': '#E50914',
                        'netflix-red-hover': '#F40612',
                        'netflix-black': '#141414',
                        'netflix-dark': '#181818',
                        'netflix-gray': '#808080',
                        'netflix-light-gray': '#B3B3B3',
                    },
                    fontFamily: {
                        heading: ['Bebas Neue', 'Impact', 'sans-serif'],
                        body: ['DM Sans', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
            --netflix-dark: #181818;
            --netflix-gray: #808080;
            --netflix-light-gray: #B3B3B3;
            --navbar-height: 68px;
        }

        body {
            font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
        }

        /* Loading spinner */
        #loader {
            position: fixed;
            inset: 0;
            background: #141414;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s;
        }
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader-ring {
            width: 56px;
            height: 56px;
            border: 3px solid #222;
            border-top-color: var(--netflix-red);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Skill card */
        .skill-card {
            background: var(--netflix-dark);
            border-radius: 6px;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            min-width: 180px;
        }
        .skill-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Skill bar */
        .skill-bar-track {
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }
        .skill-bar-fill {
            height: 100%;
            background: var(--netflix-red);
            border-radius: 3px;
            transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Top 10 style */
        .top-skill-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem;
            line-height: 1;
            color: transparent;
            -webkit-text-stroke: 2px #333;
            position: absolute;
            left: 0;
            bottom: 0;
        }

        /* Row hover */
        .skill-row:hover .row-title {
            color: #fff;
        }
        .row-title {
            transition: color 0.2s;
        }
    </style>
    <script src="js/app.js" defer></script>
</head>

<body class="bg-[#141414] text-white antialiased overflow-x-hidden">

    <!-- Loading Spinner -->
    <div id="loader">
        <div class="loader-ring"></div>
    </div>

    <!-- Navbar -->
    <nav id="navbar"
        class="fixed top-0 w-full z-[1000] transition-all duration-300 h-[68px] px-4 md:px-[60px] flex items-center justify-between bg-[#141414]">
        <div class="flex items-center gap-8">
            <a href="index.html" class="text-[#E50914] text-[2.2rem] font-bold uppercase" style="font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px;">
                MANVIR
            </a>
            <ul class="hidden md:flex gap-5 text-[0.82rem] font-medium text-[#B3B3B3]">
                <li><a href="browse.html" class="hover:text-white transition">Home</a></li>
                <li><a href="#" class="text-white cursor-default">Skills</a></li>
                <li><a href="about.html" class="hover:text-white transition">About</a></li>
            </ul>
        </div>
        <div class="flex items-center gap-4">
            <!-- Mobile Menu Button -->
            <button id="mobile-menu-btn" class="md:hidden text-white p-2 hover:text-[#B3B3B3] transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <div class="group relative hidden md:block">
                <div class="flex items-center gap-1 cursor-pointer">
                    <div class="w-8 h-8 rounded overflow-hidden">
                        <img id="nav-avatar" src="" alt="Profile" class="w-full h-full object-cover">
                    </div>
                    <svg class="w-4 h-4 text-white transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>
                <div class="absolute right-0 top-full mt-2 w-40 bg-[rgba(0,0,0,0.9)] border border-gray-700 hidden group-hover:block py-2 text-sm">
                    <a href="index.html" class="block px-4 py-2 hover:bg-gray-800"
                        onclick="localStorage.removeItem('activeProfile')">Sign out</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="fixed inset-0 bg-black/95 z-[999] hidden flex-col items-center justify-center">
        <button id="mobile-menu-close" class="absolute top-4 right-4 text-white p-2">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <ul class="flex flex-col gap-8 text-center">
            <li><a href="browse.html" class="text-2xl font-semibold text-[#B3B3B3] hover:text-white transition">Home</a></li>
            <li><a href="skills.html" class="text-2xl font-semibold text-white hover:text-[#E50914] transition">Skills</a></li>
            <li><a href="about.html" class="text-2xl font-semibold text-[#B3B3B3] hover:text-white transition">About</a></li>
        </ul>
        <div class="mt-12 flex items-center gap-3">
            <div class="w-10 h-10 rounded overflow-hidden">
                <img id="mobile-nav-avatar" src="" alt="Profile" class="w-full h-full object-cover">
            </div>
            <a href="index.html" onclick="localStorage.removeItem('activeProfile')" class="text-[#B3B3B3] hover:text-white transition">Sign out</a>
        </div>
    </div>

    <!-- Skills Section -->
    <main id="skills-container" class="pt-24 pb-20 px-4 md:px-[60px] min-h-screen">
        <h1 class="text-[clamp(2.5rem,5vw,4rem)] font-bold mb-12 border-l-4 border-[#E50914] pl-6" style="font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;">
            MY SKILLS
        </h1>
        
        <!-- Top Skills Row (Top 10 style) -->
        <div id="top-skills-row" class="mb-12 skill-row">
            <h2 class="row-title text-[1.05rem] font-semibold text-[#808080] mb-4 uppercase tracking-wide">Top Skills</h2>
            <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                <!-- Injected by JS -->
            </div>
        </div>

        <!-- Skills by Category -->
        <div id="skills-grid" class="space-y-10">
            <!-- Injected by JS -->
        </div>
    </main>

</body>

</html>
